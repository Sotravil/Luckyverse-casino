# Deploy a static site to GitHub Pages (GitHub Actions)
name: Deploy Static Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1) Pull your repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Configure Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3) Prepare the publish folder
      - name: Build (static copy)
        run: |
          mkdir -p _site

          # Copy repo contents into _site (exclude workflow + prevent self-copy)
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "_site" \
            ./ _site/

          # IMPORTANT: GitHub Pages needs lowercase index.html at site root
          if [ -f "_site/index.html" ]; then
            echo "OK: _site/index.html exists"
          elif [ -f "_site/Index.html" ]; then
            echo "Fixing: _site/Index.html -> _site/index.html"
            cp "_site/Index.html" "_site/index.html"
          else
            echo "ERROR: No index.html or Index.html found at repo root"
            echo "Contents of _site:"
            ls -la _site
            exit 1
          fi

          # Prevent Jekyll processing
          touch _site/.nojekyll

      # 4) Upload the site artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
