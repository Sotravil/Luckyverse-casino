- name: Build (static copy)
  run: |
    mkdir -p _site

    # Copy everything to the publish folder (but don't copy the publish folder into itself)
    rsync -av --delete \
      --exclude ".git" \
      --exclude ".github" \
      --exclude "_site" \
      ./ _site/

    # GitHub Pages entrypoint MUST be lowercase index.html
    if [ -f "_site/index.html" ]; then
      echo "OK: _site/index.html exists"
    elif [ -f "_site/Index.html" ]; then
      echo "Fixing: _site/Index.html -> _site/index.html"
      cp "_site/Index.html" "_site/index.html"
    else
      echo "ERROR: No index.html or Index.html found at site root"
      echo "Contents of _site:"
      ls -la _site
      exit 1
    fi

    # Prevent Jekyll processing
    touch _site/.nojekyll
